steps:
  # Step 1: Build the backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_IMAGE}"
      - "."

  # Step 2: Deploy to Cloud Run (existing env vars on the service are preserved)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_IMAGE}"
      - "--platform"
      - "managed"
      - "--region"
      - "${_REGION}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "1"
      - "--timeout"
      - "60"

images:
  - "${_IMAGE}"

substitutions:
  _IMAGE: "gcr.io/$PROJECT_ID/digiwa-backend"
  _SERVICE_NAME: "digiwa-backend"
  _REGION: "asia-southeast2"
